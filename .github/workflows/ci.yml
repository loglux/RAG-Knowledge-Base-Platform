name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + black + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps (libmagic for python-magic)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmagic1

      - name: Create venv
        run: python -m venv .venv

      - name: Install Python dependencies
        run: make install-dev

      - name: Lint (ruff + black --check)
        run: make lint

      - name: Unit tests
        run: make test-unit

  frontend:
    name: Frontend (eslint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        run: make frontend-lint

      - name: Build
        run: make frontend-build
